<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/favicon.png">

    <meta id="meta-description" name="description" content="Veja os ingredientes e o modo de preparo desta receita.">
    <meta name="author" content="Kaleo Cordeiro">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Receitas Simples e Saudáveis">

    <title>Detalhes da receita | Receitas Simples e Saudáveis</title>
</head>

<body class="min-h-screen bg-stone-50 font-sans text-stone-800">
    <header class="sticky top-0 z-50 border-b border-stone-200 bg-white/95 shadow-sm backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 lg:px-6">
            <a href="index.html" class="flex items-center gap-3" aria-label="Voltar à página inicial">
                <img
                    src="img/imagem_logo_reajustada.png"
                    alt="Receitas Simples e Saudáveis"
                    class="h-auto w-20 lg:w-24"
                >
                <span class="hidden text-lg font-extrabold text-lime-800 sm:block">Receitas Saudáveis</span>
            </a>

            <a href="index.html#receitas" class="inline-flex items-center gap-2 rounded-xl border border-lime-700 px-4 py-2 font-bold text-lime-800 transition hover:bg-lime-700 hover:text-white">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Todas as receitas</span>
                <span class="sm:hidden">Voltar</span>
            </a>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 lg:px-6 lg:py-12">
        <div id="recipe-container" aria-live="polite">
            <section class="overflow-hidden rounded-3xl border border-stone-200 bg-white shadow-sm">
                <div class="h-[340px] animate-pulse bg-stone-200 lg:h-[520px]"></div>
                <div class="space-y-4 p-6 lg:p-10">
                    <div class="h-7 w-32 animate-pulse rounded-full bg-stone-200"></div>
                    <div class="h-12 w-3/4 animate-pulse rounded bg-stone-200"></div>
                    <div class="h-5 w-1/2 animate-pulse rounded bg-stone-200"></div>
                </div>
            </section>
        </div>
    </main>

    <footer class="mt-8 border-t border-stone-200 bg-white">
        <div class="mx-auto max-w-6xl px-4 py-6 text-center text-sm text-stone-500 lg:px-6">
            Receitas Simples e Saudáveis — bom preparo e bom apetite!
        </div>
    </footer>

    <script>
        const API_URL = 'https://receitas-brc6.onrender.com/receitas';
        const FALLBACK_IMAGE = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
                <rect width="1200" height="800" fill="#e7e5e4"/>
                <text x="600" y="380" text-anchor="middle" font-family="Arial" font-size="54" fill="#57534e">Receita</text>
                <text x="600" y="445" text-anchor="middle" font-family="Arial" font-size="28" fill="#78716c">Imagem indisponível</text>
            </svg>
        `)}`;

        const container = document.getElementById('recipe-container');

        function safeImageUrl(value) {
            try {
                const url = new URL(value);
                return ['http:', 'https:'].includes(url.protocol) ? url.href : FALLBACK_IMAGE;
            } catch {
                return FALLBACK_IMAGE;
            }
        }

        function createElement(tag, className, text) {
            const element = document.createElement(tag);
            if (className) element.className = className;
            if (text !== undefined) element.textContent = text;
            return element;
        }

        function splitPreparationIntoSteps(text) {
            const cleanText = String(text || '').trim();
            if (!cleanText) return [];

            const sentences = cleanText.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [cleanText];
            return sentences.map((sentence) => sentence.trim()).filter(Boolean);
        }

        function updatePageMetadata(recipe) {
            const title = recipe.titulo || 'Detalhes da receita';
            const description = `Aprenda a preparar ${title}. Veja ingredientes, tempo estimado e modo de preparo.`;

            document.title = `${title} | Receitas Simples e Saudáveis`;
            document.getElementById('meta-description').setAttribute('content', description);

            const metadata = {
                'og:title': title,
                'og:description': description,
                'og:image': safeImageUrl(recipe.imagem_url)
            };

            Object.entries(metadata).forEach(([property, content]) => {
                let meta = document.querySelector(`meta[property="${property}"]`);
                if (!meta) {
                    meta = document.createElement('meta');
                    meta.setAttribute('property', property);
                    document.head.appendChild(meta);
                }
                meta.setAttribute('content', content);
            });
        }

        function renderRecipe(recipe) {
            updatePageMetadata(recipe);

            const article = createElement('article', 'overflow-hidden rounded-3xl border border-stone-200 bg-white shadow-lg');

            const hero = createElement('div', 'relative h-[340px] overflow-hidden bg-stone-200 sm:h-[440px] lg:h-[560px]');
            const image = createElement('img', 'h-full w-full object-cover');
            image.src = safeImageUrl(recipe.imagem_url);
            image.alt = recipe.titulo || 'Imagem da receita';
            image.addEventListener('error', () => {
                image.src = FALLBACK_IMAGE;
            }, { once: true });

            const gradient = createElement('div', 'absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent');
            const category = createElement('span', 'absolute bottom-6 left-6 rounded-full bg-orange-500 px-4 py-2 text-sm font-extrabold uppercase tracking-wide text-white sm:bottom-8 sm:left-8', recipe.categoria || 'Receita');
            hero.append(image, gradient, category);

            const intro = createElement('div', 'p-6 sm:p-8 lg:p-10');

            const breadcrumb = createElement('nav', 'mb-5 text-sm font-semibold text-stone-500');
            breadcrumb.setAttribute('aria-label', 'Navegação estrutural');
            breadcrumb.innerHTML = '<a href="index.html" class="hover:text-orange-500">Início</a><span class="mx-2">/</span><a href="index.html#receitas" class="hover:text-orange-500">Receitas</a><span class="mx-2">/</span>';
            const currentPage = createElement('span', 'text-stone-800', recipe.titulo || 'Detalhes');
            breadcrumb.append(currentPage);

            const title = createElement('h1', 'max-w-4xl text-3xl font-black leading-tight text-stone-950 sm:text-4xl lg:text-5xl', recipe.titulo || 'Receita sem título');

            const meta = createElement('div', 'mt-6 flex flex-wrap gap-3');
            const time = createElement('span', 'inline-flex items-center gap-2 rounded-xl bg-lime-50 px-4 py-3 font-bold text-lime-900');
            time.innerHTML = '<i class="fa-regular fa-clock text-lime-700"></i>';
            time.append(document.createTextNode(`${recipe.tempo_estimado_minutos ?? '--'} minutos`));

            const servings = createElement('span', 'inline-flex items-center gap-2 rounded-xl bg-orange-50 px-4 py-3 font-bold text-orange-900');
            servings.innerHTML = '<i class="fa-solid fa-users text-orange-500"></i>';
            servings.append(document.createTextNode(`${recipe.porcoes ?? '--'} ${Number(recipe.porcoes) === 1 ? 'porção' : 'porções'}`));

            const ingredientsTotal = createElement('span', 'inline-flex items-center gap-2 rounded-xl bg-stone-100 px-4 py-3 font-bold text-stone-700');
            ingredientsTotal.innerHTML = '<i class="fa-solid fa-basket-shopping text-stone-500"></i>';
            ingredientsTotal.append(document.createTextNode(`${Array.isArray(recipe.ingredientes) ? recipe.ingredientes.length : 0} ingredientes`));

            meta.append(time, servings, ingredientsTotal);
            intro.append(breadcrumb, title, meta);

            const contentGrid = createElement('div', 'grid gap-8 border-t border-stone-200 p-6 sm:p-8 lg:grid-cols-[0.8fr_1.2fr] lg:p-10');

            const ingredientsSection = createElement('section', 'self-start rounded-2xl bg-lime-50 p-6 lg:sticky lg:top-28');
            const ingredientsTitle = createElement('h2', 'flex items-center gap-3 text-2xl font-black text-lime-950');
            ingredientsTitle.innerHTML = '<span class="flex h-11 w-11 items-center justify-center rounded-full bg-lime-700 text-white"><i class="fa-solid fa-basket-shopping"></i></span><span>Ingredientes</span>';

            const ingredientsList = createElement('ul', 'mt-6 space-y-3');
            const ingredients = Array.isArray(recipe.ingredientes) ? recipe.ingredientes : [];

            if (ingredients.length) {
                ingredients.forEach((ingredient) => {
                    const item = createElement('li', 'flex gap-3 rounded-xl bg-white p-4 leading-relaxed text-stone-700 shadow-sm');
                    const check = createElement('span', 'mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-orange-100 text-xs text-orange-600');
                    check.innerHTML = '<i class="fa-solid fa-check"></i>';
                    const text = createElement('span', '', ingredient);
                    item.append(check, text);
                    ingredientsList.append(item);
                });
            } else {
                ingredientsList.append(createElement('li', 'text-stone-600', 'Ingredientes não informados.'));
            }

            ingredientsSection.append(ingredientsTitle, ingredientsList);

            const preparationSection = createElement('section', 'min-w-0');
            const preparationTitle = createElement('h2', 'flex items-center gap-3 text-2xl font-black text-stone-950');
            preparationTitle.innerHTML = '<span class="flex h-11 w-11 items-center justify-center rounded-full bg-orange-500 text-white"><i class="fa-solid fa-fire-burner"></i></span><span>Modo de preparo</span>';

            const stepsList = createElement('ol', 'mt-6 space-y-5');
            const steps = splitPreparationIntoSteps(recipe.modo_de_preparo);

            if (steps.length) {
                steps.forEach((step, index) => {
                    const item = createElement('li', 'flex gap-4');
                    const number = createElement('span', 'flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-stone-900 font-black text-white', String(index + 1));
                    const text = createElement('p', 'pt-1.5 text-base leading-7 text-stone-700 sm:text-lg', step);
                    item.append(number, text);
                    stepsList.append(item);
                });
            } else {
                stepsList.append(createElement('li', 'text-stone-600', 'Modo de preparo não informado.'));
            }

            const actions = createElement('div', 'mt-10 flex flex-wrap gap-3 border-t border-stone-200 pt-6');

            const backLink = createElement('a', 'inline-flex h-12 items-center justify-center gap-2 rounded-xl bg-lime-700 px-5 font-extrabold text-white transition hover:bg-lime-800');
            backLink.href = 'index.html#receitas';
            backLink.innerHTML = '<i class="fa-solid fa-arrow-left"></i><span>Ver outras receitas</span>';

            const printButton = createElement('button', 'inline-flex h-12 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-5 font-extrabold text-stone-700 transition hover:bg-stone-100');
            printButton.type = 'button';
            printButton.innerHTML = '<i class="fa-solid fa-print"></i><span>Imprimir</span>';
            printButton.addEventListener('click', () => window.print());

            actions.append(backLink, printButton);
            preparationSection.append(preparationTitle, stepsList, actions);
            contentGrid.append(ingredientsSection, preparationSection);

            article.append(hero, intro, contentGrid);
            container.replaceChildren(article);
        }

        function renderError(title, message) {
            container.innerHTML = `
                <section class="rounded-3xl border border-red-200 bg-white p-8 text-center shadow-sm sm:p-12">
                    <span class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-red-100 text-2xl text-red-600">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </span>
                    <h1 class="mt-5 text-3xl font-black text-stone-900">${title}</h1>
                    <p class="mx-auto mt-3 max-w-xl text-stone-600">${message}</p>
                    <div class="mt-7 flex flex-wrap justify-center gap-3">
                        <button id="retry-button" type="button" class="rounded-xl bg-orange-500 px-5 py-3 font-bold text-white hover:bg-orange-600">Tentar novamente</button>
                        <a href="index.html" class="rounded-xl border border-stone-300 px-5 py-3 font-bold text-stone-700 hover:bg-stone-100">Voltar ao início</a>
                    </div>
                </section>
            `;
            document.getElementById('retry-button').addEventListener('click', loadRecipe);
        }

        async function loadRecipe() {
            const recipeId = new URLSearchParams(window.location.search).get('id');

            if (!recipeId || !/^\d+$/.test(recipeId)) {
                renderError('Receita não identificada', 'Abra esta página clicando em uma receita da listagem ou informe um ID válido na URL.');
                return;
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 20000);
                const response = await fetch(`${API_URL}/${encodeURIComponent(recipeId)}`, {
                    headers: { Accept: 'application/json' },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (response.status === 404) {
                    throw new Error('NOT_FOUND');
                }

                if (!response.ok) {
                    throw new Error(`HTTP_${response.status}`);
                }

                const recipe = await response.json();
                if (!recipe || typeof recipe !== 'object' || Array.isArray(recipe)) {
                    throw new Error('INVALID_RESPONSE');
                }

                renderRecipe(recipe);
            } catch (error) {
                console.error('Erro ao carregar receita:', error);

                if (error.message === 'NOT_FOUND') {
                    renderError('Receita não encontrada', `Não existe uma receita cadastrada com o ID ${recipeId}.`);
                    return;
                }

                renderError(
                    'Não foi possível carregar a receita',
                    error.name === 'AbortError'
                        ? 'A API demorou mais que o esperado. Tente novamente em alguns instantes.'
                        : 'Confira sua conexão e se a API está disponível para acesso pelo navegador.'
                );
            }
        }

        loadRecipe();
    </script>
</body>
</html>
