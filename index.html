<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="apple-touch-icon" href="img/favicon.png">

    <meta name="description" content="Encontre receitas simples, saudáveis e deliciosas para o seu dia a dia.">
    <meta name="author" content="Kaleo Cordeiro">
    <meta name="keywords" content="receitas simples, receitas saudáveis, alimentação saudável, comida fitness, almoço rápido, lanches saudáveis, receitas fáceis">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Receitas Simples e Saudáveis">
    <meta property="og:title" content="Receitas Simples e Saudáveis — Praticidade e Sabor">
    <meta property="og:description" content="Receitas fáceis, rápidas e saborosas para todos os momentos.">
    <meta property="og:url" content="https://www.receitassimplesesaudaveis.com.br">

    <title>Receitas Simples e Saudáveis</title>
</head>

<body class="min-h-screen bg-stone-50 font-sans text-stone-800">
    <header class="sticky top-0 z-50 border-b border-stone-200 bg-white/95 shadow-sm backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 lg:px-6">
            <a href="index.html" class="flex shrink-0 items-center gap-3" aria-label="Página inicial">
                <img
                    src="img/imagem_logo_reajustada.png"
                    alt="Receitas Simples e Saudáveis"
                    class="h-auto w-20 lg:w-24"
                >
                
            </a>

            <button
                id="menu-btn"
                type="button"
                class="ml-auto rounded-lg p-2 text-2xl text-lime-700 hover:bg-lime-50 lg:hidden"
                aria-label="Abrir menu"
                aria-expanded="false"
            >
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav id="menu" class="absolute left-0 right-0 top-full hidden border-b border-stone-200 bg-white p-4 shadow-lg lg:static lg:block lg:border-0 lg:bg-transparent lg:p-0 lg:shadow-none">
                <ul class="flex flex-col gap-3 font-semibold lg:flex-row lg:items-center lg:gap-5">
                    <li><a href="index.html" class="text-lime-700 hover:text-orange-500">INÍCIO</a></li>
                    <li><button type="button" data-category="Todas" class="category-nav hover:text-orange-500">RECEITAS</button></li>
                    <li><button type="button" data-category="Café da Manhã" class="category-nav hover:text-orange-500">CAFÉ</button></li>
                    <li><button type="button" data-category="Pratos Principais" class="category-nav hover:text-orange-500">PRATOS PRINCIPAIS</button></li>
                    <li><button type="button" data-category="Sobremesas" class="category-nav hover:text-orange-500">SOBREMESAS</button></li>
                    <li><a href="html/meu_contato.html" class="hover:text-orange-500">CONTATO</a></li>
                </ul>
            </nav>

            <label class="hidden min-w-52 items-center overflow-hidden rounded-xl border border-stone-300 bg-white focus-within:border-lime-600 lg:flex">
                <span class="sr-only">Buscar receita</span>
                <input
                    id="header-search"
                    type="search"
                    placeholder="Buscar receita"
                    class="h-11 w-full border-0 px-3 outline-none"
                    autocomplete="off"
                >
                <span class="flex h-11 w-11 items-center justify-center text-lime-700">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
            </label>
        </div>
    </header>

    <section class="mx-auto flex max-w-7xl flex-col gap-8 px-4 py-8 lg:flex-row lg:px-6">
        <main class="min-w-0 flex-1">
            <section id="hero" aria-live="polite" class="relative min-h-[420px] overflow-hidden rounded-3xl bg-stone-200 shadow-lg lg:min-h-[560px]">
                <div class="absolute inset-0 animate-pulse bg-stone-300"></div>
                <div class="absolute bottom-8 left-8 right-8 max-w-xl space-y-4">
                    <div class="h-8 w-2/3 animate-pulse rounded bg-white/60"></div>
                    <div class="h-5 w-full animate-pulse rounded bg-white/50"></div>
                    <div class="h-11 w-48 animate-pulse rounded-xl bg-orange-300/70"></div>
                </div>
            </section>

            <section id="receitas" class="scroll-mt-28 pt-10">
                <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
                    <div>
                        <p class="text-sm font-bold uppercase tracking-[0.2em] text-orange-500">Para experimentar hoje</p>
                        <h1 class="text-3xl font-black text-stone-900">Novas receitas</h1>
                    </div>
                    <p id="recipes-count" class="text-sm font-semibold text-stone-500">Carregando receitas...</p>
                </div>

                <div id="status-message" class="mt-6" role="status" aria-live="polite"></div>
                <div id="recipes-grid" class="mt-6 grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>
            </section>
        </main>

        <aside class="w-full shrink-0 lg:w-72 xl:w-80">
            <div class="sticky top-28 space-y-8">
                <section class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
                    <h2 class="text-xl font-black text-stone-900">Buscar receitas</h2>
                    <label class="mt-4 flex items-center overflow-hidden rounded-xl border border-stone-300 focus-within:border-lime-600 focus-within:ring-2 focus-within:ring-lime-100">
                        <span class="sr-only">Buscar receitas</span>
                        <input
                            id="sidebar-search"
                            type="search"
                            placeholder="Nome ou ingrediente"
                            class="h-11 w-full px-3 outline-none"
                            autocomplete="off"
                        >
                        <span class="flex h-11 w-11 items-center justify-center text-lime-700">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                    </label>
                </section>

                <section class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
                    <h2 class="text-xl font-black text-stone-900">Categorias</h2>
                    <div id="categories-list" class="mt-4 flex flex-wrap gap-2">
                        <span class="h-9 w-28 animate-pulse rounded-full bg-stone-200"></span>
                        <span class="h-9 w-24 animate-pulse rounded-full bg-stone-200"></span>
                    </div>
                </section>

                <section class="rounded-2xl bg-lime-800 p-5 text-white shadow-sm">
                    <div class="mb-3 inline-flex h-11 w-11 items-center justify-center rounded-full bg-white/15 text-xl">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <h2 class="text-xl font-black">Newsletter</h2>
                    <p class="mt-1 text-sm text-lime-100">Receba novas ideias de receitas no seu e-mail.</p>
                    <form id="newsletter-form" class="mt-4 space-y-3">
                        <input type="text" placeholder="Seu nome" class="h-11 w-full rounded-xl border-0 px-3 text-stone-800 outline-none" required>
                        <input type="email" placeholder="Seu e-mail" class="h-11 w-full rounded-xl border-0 px-3 text-stone-800 outline-none" required>
                        <button type="submit" class="h-11 w-full rounded-xl bg-orange-500 px-5 font-extrabold transition hover:bg-orange-600">INSCREVER-SE</button>
                    </form>
                </section>

                <section class="rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
                    <h2 class="text-xl font-black text-stone-900">Siga-nos</h2>
                    <div class="mt-4 flex gap-4 text-3xl text-stone-700">
                        <a href="#" aria-label="Instagram" class="hover:text-orange-500"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" aria-label="Pinterest" class="hover:text-orange-500"><i class="fa-brands fa-pinterest"></i></a>
                        <a href="#" aria-label="Facebook" class="hover:text-orange-500"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" aria-label="TikTok" class="hover:text-orange-500"><i class="fa-brands fa-tiktok"></i></a>
                    </div>
                </section>
            </div>
        </aside>
    </section>

    <footer class="mt-8 border-t border-stone-200 bg-white">
        <div class="mx-auto max-w-7xl px-4 py-6 text-center text-sm text-stone-500 lg:px-6">
            Receitas Simples e Saudáveis — praticidade e sabor no seu dia a dia.
        </div>
    </footer>

    <script>
        const API_URL = 'https://receitas-brc6.onrender.com/receitas';
        const FALLBACK_IMAGE = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
                <rect width="800" height="600" fill="#e7e5e4"/>
                <text x="400" y="285" text-anchor="middle" font-family="Arial" font-size="38" fill="#57534e">Receita</text>
                <text x="400" y="335" text-anchor="middle" font-family="Arial" font-size="22" fill="#78716c">Imagem indisponível</text>
            </svg>
        `)}`;

        const state = {
            recipes: [],
            search: '',
            category: 'Todas'
        };

        const hero = document.getElementById('hero');
        const grid = document.getElementById('recipes-grid');
        const count = document.getElementById('recipes-count');
        const statusMessage = document.getElementById('status-message');
        const categoriesList = document.getElementById('categories-list');
        const headerSearch = document.getElementById('header-search');
        const sidebarSearch = document.getElementById('sidebar-search');
        const menuButton = document.getElementById('menu-btn');
        const menu = document.getElementById('menu');

        function normalizeText(value = '') {
            return String(value)
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .trim();
        }

        function safeImageUrl(value) {
            try {
                const url = new URL(value);
                return ['http:', 'https:'].includes(url.protocol) ? url.href : FALLBACK_IMAGE;
            } catch {
                return FALLBACK_IMAGE;
            }
        }

        function shorten(text, maxLength = 115) {
            const cleanText = String(text || '').trim();
            return cleanText.length > maxLength ? `${cleanText.slice(0, maxLength).trim()}…` : cleanText;
        }

        function createMetaItem(iconClass, label) {
            const item = document.createElement('span');
            item.className = 'inline-flex items-center gap-2 text-sm font-semibold text-stone-600';

            const icon = document.createElement('i');
            icon.className = iconClass;
            icon.setAttribute('aria-hidden', 'true');

            const text = document.createElement('span');
            text.textContent = label;

            item.append(icon, text);
            return item;
        }

        function renderHero(recipe) {
            if (!recipe) {
                hero.innerHTML = `
                    <div class="flex min-h-[420px] items-center justify-center p-8 text-center lg:min-h-[560px]">
                        <div>
                            <i class="fa-solid fa-utensils text-5xl text-stone-400"></i>
                            <p class="mt-4 text-lg font-bold text-stone-600">Nenhuma receita disponível.</p>
                        </div>
                    </div>
                `;
                return;
            }

            const image = document.createElement('img');
            image.src = safeImageUrl(recipe.imagem_url);
            image.alt = recipe.titulo || 'Imagem da receita';
            image.className = 'absolute inset-0 h-full w-full object-cover';
            image.addEventListener('error', () => {
                image.src = FALLBACK_IMAGE;
            }, { once: true });

            const overlay = document.createElement('div');
            overlay.className = 'absolute inset-0 bg-gradient-to-r from-black/80 via-black/50 to-black/10';

            const content = document.createElement('div');
            content.className = 'absolute inset-x-0 bottom-0 max-w-2xl p-6 text-white sm:p-10 lg:p-12';

            const category = document.createElement('span');
            category.className = 'inline-flex rounded-full bg-orange-500 px-4 py-1.5 text-sm font-extrabold uppercase tracking-wide';
            category.textContent = recipe.categoria || 'Receita';

            const title = document.createElement('h2');
            title.className = 'mt-4 text-3xl font-black leading-tight sm:text-4xl lg:text-5xl';
            title.textContent = recipe.titulo || 'Receita em destaque';

            const description = document.createElement('p');
            description.className = 'mt-3 max-w-xl text-base leading-relaxed text-stone-100 sm:text-lg';
            description.textContent = shorten(recipe.modo_de_preparo, 150);

            const meta = document.createElement('div');
            meta.className = 'mt-5 flex flex-wrap gap-5';
            meta.append(
                createMetaItem('fa-regular fa-clock text-orange-300', `${recipe.tempo_estimado_minutos ?? '--'} min`),
                createMetaItem('fa-solid fa-users text-orange-300', `${recipe.porcoes ?? '--'} ${Number(recipe.porcoes) === 1 ? 'porção' : 'porções'}`)
            );
            meta.querySelectorAll('span').forEach((element) => element.classList.add('text-white'));

            const link = document.createElement('a');
            link.href = `receita.html?id=${encodeURIComponent(recipe.id)}`;
            link.className = 'mt-7 inline-flex h-12 items-center justify-center gap-2 rounded-xl bg-orange-500 px-6 font-extrabold transition hover:-translate-y-0.5 hover:bg-orange-600';
            link.innerHTML = '<span>VER RECEITA COMPLETA</span><i class="fa-solid fa-arrow-right"></i>';

            content.append(category, title, description, meta, link);
            hero.replaceChildren(image, overlay, content);
        }

        function createRecipeCard(recipe) {
            const article = document.createElement('article');
            article.className = 'group overflow-hidden rounded-2xl border border-stone-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-xl';

            const linkImage = document.createElement('a');
            linkImage.href = `receita.html?id=${encodeURIComponent(recipe.id)}`;
            linkImage.className = 'relative block overflow-hidden';

            const image = document.createElement('img');
            image.src = safeImageUrl(recipe.imagem_url);
            image.alt = recipe.titulo || 'Imagem da receita';
            image.loading = 'lazy';
            image.className = 'h-52 w-full object-cover transition duration-500 group-hover:scale-105';
            image.addEventListener('error', () => {
                image.src = FALLBACK_IMAGE;
            }, { once: true });

            const badge = document.createElement('span');
            badge.className = 'absolute left-4 top-4 rounded-full bg-white/95 px-3 py-1 text-xs font-extrabold text-lime-800 shadow';
            badge.textContent = recipe.categoria || 'Receita';

            linkImage.append(image, badge);

            const content = document.createElement('div');
            content.className = 'p-5';

            const meta = document.createElement('div');
            meta.className = 'flex flex-wrap gap-x-4 gap-y-2';
            meta.append(
                createMetaItem('fa-regular fa-clock text-orange-500', `${recipe.tempo_estimado_minutos ?? '--'} min`),
                createMetaItem('fa-solid fa-utensils text-orange-500', `${recipe.porcoes ?? '--'} ${Number(recipe.porcoes) === 1 ? 'porção' : 'porções'}`)
            );

            const title = document.createElement('h2');
            title.className = 'mt-3 text-xl font-black leading-tight text-stone-900';

            const titleLink = document.createElement('a');
            titleLink.href = `receita.html?id=${encodeURIComponent(recipe.id)}`;
            titleLink.className = 'transition hover:text-orange-500';
            titleLink.textContent = recipe.titulo || 'Receita sem título';
            title.append(titleLink);

            const description = document.createElement('p');
            description.className = 'mt-3 min-h-18 text-sm leading-relaxed text-stone-600';
            description.textContent = shorten(recipe.modo_de_preparo);

            const footer = document.createElement('div');
            footer.className = 'mt-5 flex items-center justify-between border-t border-stone-100 pt-4';

            const ingredients = document.createElement('span');
            ingredients.className = 'text-xs font-bold uppercase tracking-wide text-stone-500';
            ingredients.textContent = `${Array.isArray(recipe.ingredientes) ? recipe.ingredientes.length : 0} ingredientes`;

            const detailsLink = document.createElement('a');
            detailsLink.href = `receita.html?id=${encodeURIComponent(recipe.id)}`;
            detailsLink.className = 'inline-flex items-center gap-2 font-extrabold text-orange-500 hover:text-orange-600';
            detailsLink.innerHTML = '<span>Saiba mais</span><i class="fa-solid fa-arrow-right text-sm"></i>';

            footer.append(ingredients, detailsLink);
            content.append(meta, title, description, footer);
            article.append(linkImage, content);
            return article;
        }

        function getFilteredRecipes() {
            const query = normalizeText(state.search);

            return state.recipes.filter((recipe) => {
                const matchesCategory = state.category === 'Todas' || recipe.categoria === state.category;
                const searchableContent = normalizeText([
                    recipe.titulo,
                    recipe.categoria,
                    ...(Array.isArray(recipe.ingredientes) ? recipe.ingredientes : [])
                ].join(' '));
                const matchesSearch = !query || searchableContent.includes(query);
                return matchesCategory && matchesSearch;
            });
        }

        function renderRecipes() {
            const filteredRecipes = getFilteredRecipes();
            grid.replaceChildren(...filteredRecipes.map(createRecipeCard));

            count.textContent = `${filteredRecipes.length} ${filteredRecipes.length === 1 ? 'receita encontrada' : 'receitas encontradas'}`;
            statusMessage.innerHTML = '';

            if (filteredRecipes.length === 0) {
                statusMessage.innerHTML = `
                    <div class="rounded-2xl border border-dashed border-stone-300 bg-white p-8 text-center">
                        <i class="fa-solid fa-magnifying-glass text-4xl text-stone-300"></i>
                        <h2 class="mt-4 text-xl font-black text-stone-800">Nenhuma receita encontrada</h2>
                        <p class="mt-2 text-stone-500">Tente outra palavra ou escolha uma categoria diferente.</p>
                        <button id="clear-filters" type="button" class="mt-5 rounded-xl bg-lime-700 px-5 py-3 font-bold text-white hover:bg-lime-800">Limpar filtros</button>
                    </div>
                `;
                document.getElementById('clear-filters').addEventListener('click', clearFilters);
            }

            updateCategoryButtons();
        }

        function renderCategories() {
            const categories = [...new Set(state.recipes.map((recipe) => recipe.categoria).filter(Boolean))]
                .sort((a, b) => a.localeCompare(b, 'pt-BR'));

            const categoryOptions = ['Todas', ...categories];
            const buttons = categoryOptions.map((category) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.dataset.category = category;
                button.className = 'category-filter rounded-full border px-4 py-2 text-sm font-bold transition';

                const categoryTotal = category === 'Todas'
                    ? state.recipes.length
                    : state.recipes.filter((recipe) => recipe.categoria === category).length;

                button.textContent = `${category} (${categoryTotal})`;
                button.addEventListener('click', () => selectCategory(category));
                return button;
            });

            categoriesList.replaceChildren(...buttons);
            updateCategoryButtons();
        }

        function updateCategoryButtons() {
            document.querySelectorAll('.category-filter').forEach((button) => {
                const isActive = button.dataset.category === state.category;
                button.classList.toggle('border-lime-700', isActive);
                button.classList.toggle('bg-lime-700', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('border-stone-200', !isActive);
                button.classList.toggle('bg-stone-50', !isActive);
                button.classList.toggle('text-stone-700', !isActive);
            });
        }

        function selectCategory(category) {
            state.category = category;
            renderRecipes();
            document.getElementById('receitas').scrollIntoView({ behavior: 'smooth', block: 'start' });

            if (window.innerWidth < 1024) {
                menu.classList.add('hidden');
                menuButton.setAttribute('aria-expanded', 'false');
            }
        }

        function setSearch(value) {
            state.search = value;
            if (headerSearch) headerSearch.value = value;
            sidebarSearch.value = value;
            renderRecipes();
        }

        function clearFilters() {
            state.category = 'Todas';
            setSearch('');
        }

        async function loadRecipes() {
            statusMessage.innerHTML = `
                <div class="rounded-2xl border border-stone-200 bg-white p-5 text-center text-stone-600">
                    <i class="fa-solid fa-circle-notch fa-spin mr-2 text-lime-700"></i>
                    Buscando receitas na API...
                </div>
            `;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 20000);
                const response = await fetch(API_URL, {
                    headers: { Accept: 'application/json' },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`A API respondeu com o status ${response.status}.`);
                }

                const data = await response.json();
                if (!Array.isArray(data)) {
                    throw new Error('A resposta da API não contém uma lista de receitas.');
                }

                state.recipes = data;
                renderHero(state.recipes[0]);
                renderCategories();
                renderRecipes();
            } catch (error) {
                console.error('Erro ao carregar receitas:', error);
                hero.innerHTML = `
                    <div class="flex min-h-[420px] items-center justify-center p-8 text-center lg:min-h-[560px]">
                        <div class="max-w-md">
                            <i class="fa-solid fa-triangle-exclamation text-5xl text-orange-500"></i>
                            <h2 class="mt-4 text-2xl font-black text-stone-800">Não foi possível carregar o destaque</h2>
                            <p class="mt-2 text-stone-600">A API pode estar iniciando ou temporariamente indisponível.</p>
                        </div>
                    </div>
                `;
                count.textContent = '0 receitas carregadas';
                grid.innerHTML = '';
                categoriesList.innerHTML = '';
                statusMessage.innerHTML = `
                    <div class="rounded-2xl border border-red-200 bg-red-50 p-6 text-center">
                        <h2 class="font-black text-red-800">Não foi possível acessar as receitas</h2>
                        <p class="mt-2 text-sm text-red-700">${error.name === 'AbortError' ? 'A requisição demorou mais que o esperado.' : 'Confira sua conexão e se o servidor permite acesso pelo navegador.'}</p>
                        <button id="retry-button" type="button" class="mt-4 rounded-xl bg-red-700 px-5 py-3 font-bold text-white hover:bg-red-800">Tentar novamente</button>
                    </div>
                `;
                document.getElementById('retry-button').addEventListener('click', loadRecipes);
            }
        }

        headerSearch?.addEventListener('input', (event) => setSearch(event.target.value));
        sidebarSearch.addEventListener('input', (event) => setSearch(event.target.value));

        document.querySelectorAll('.category-nav').forEach((button) => {
            button.addEventListener('click', () => selectCategory(button.dataset.category));
        });

        menuButton.addEventListener('click', () => {
            const willOpen = menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            menuButton.setAttribute('aria-expanded', String(willOpen));
            menuButton.innerHTML = willOpen
                ? '<i class="fa-solid fa-xmark"></i>'
                : '<i class="fa-solid fa-bars"></i>';
        });

        document.getElementById('newsletter-form').addEventListener('submit', (event) => {
            event.preventDefault();
            alert('Cadastro recebido! Conecte este formulário ao seu serviço de newsletter para armazenar os dados.');
            event.currentTarget.reset();
        });

        loadRecipes();
    </script>
</body>
</html>
